<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Kanban Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Simple Kanban Board</h1>
      <div class="board">
        <div class="list" id="todo">
          <h2>To Do</h2>
          <div class="card" draggable="true">Wash Dishes</div>
          <div class="card" draggable="true">Take Out Trash</div>
          <div class="card" draggable="true">Do Laundry</div>
        </div>
        <div class="list" id="inprogress">
          <h2>In Progress</h2>
          <div class="card" draggable="true">Buy Groceries</div>
          <div class="card" draggable="true">Walk the Dog</div>
        </div>
        <div class="list" id="done">
          <h2>Done</h2>
          <div class="card" draggable="true">Clean Room</div>
          <div class="card" draggable="true">Pay Bills</div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
